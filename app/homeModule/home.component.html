<div class="home-page homepic">
    <section class="home-hero">
        <div class="mrgText2 text-center">We're engaged & getting married</div>

        <div class="home-couple-row" [ngClass]="{'topMargin10': (deviceWidth > 768)}">
            <div class="home-portrait nikhilpic couple nxBoxShadow" aria-label="Nikhil"></div>

            <div class="home-title text-center">
                <span style="color:#e40046">Nikhil</span>
                <span class="weds" style="color:#4A96AD"> Weds </span>
                <span style="color:#e40046">Vidya</span>
            </div>

            <div class="home-portrait vidyapic couple nxBoxShadow" aria-label="Vidya"></div>
        </div>

        <div class="home-date-block" [ngClass]="{'topMargin10': (deviceWidth > 768)}">
            <div class="mrgText3 text-center">Save the date</div>
            <div class="mrgText4 text-center">Wednesday</div>
            <div class="mrgText5 text-center">28<sup>th</sup> June 2017</div>
        </div>
    </section>

    <section class="time-flex-container">
        <div class="text-center nxDayTime">
            <span class="nxTime" style="color:#4A96AD">{{days}}</span>
            <span class="nxTimeString">Days</span>
        </div>
        <div class="text-center nxDayTime">
            <div class="nxTime" style="color:#4A96AD">{{hours}}</div>
            <div class="nxTimeString">Hours</div>
        </div>
        <div class="text-center nxDayTime">
            <span class="nxTime" style="color:#4A96AD">{{minutes}}</span>
            <span class="nxTimeString">Minutes</span>
        </div>
        <div class="text-center nxDayTime">
            <span class="nxTime" style="color:#4A96AD" [@time]="triggerSecond">{{seconds}}</span>
            <span class="nxTimeString">Seconds</span>
        </div>
    </section>
</div>
<nxModal [data]="data" [showWhat]="what" *ngIf="showModal"></nxModal>
