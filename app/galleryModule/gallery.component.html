<div class="col-xs-12 nxHeight">
    <div class="col-xs-12 nxHeight gallery-page">
        <div class="gallery-grid">
            <div *ngFor="let pic of data;let i=index" class="galleryCard" (click)="modal.show(i)">
                <img md-card-image [src]="pic.path" class="galleryImg" loading="lazy">
            </div>
            <nxModal [data]="data" [showWhat]="what"></nxModal>
        </div>
    </div>
</div>
